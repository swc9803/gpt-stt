steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - gcr.io/$PROJECT_ID/${_SERVICE}
      - .

  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - gcr.io/$PROJECT_ID/${_SERVICE}

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE}
      - --image
      - gcr.io/$PROJECT_ID/${_SERVICE}
      - --region
      - ${_REGION}
      - --platform
      - managed
      - --allow-unauthenticated
      - --memory
      - ${_MEMORY}
      - --cpu
      - ${_CPU}
      - --timeout
      - ${_TIMEOUT}
      - --max-instances
      - ${_MAX_INSTANCES}
      - --concurrency
      - ${_CONCURRENCY}
      - --set-env-vars
      - CHAT_PROVIDER=hermes-codex,HERMES_CODEX_MODEL=${_CODEX_MODEL},HERMES_CODEX_TOOLSETS=safe,HERMES_CODEX_TIMEOUT_MS=90000,ELEVENLABS_MODEL_ID=${_ELEVENLABS_MODEL_ID},ELEVENLABS_VOICE_ID=${_ELEVENLABS_VOICE_ID},ELEVENLABS_OUTPUT_FORMAT=${_ELEVENLABS_OUTPUT_FORMAT},ENABLE_SERVER_TTS=${_ENABLE_SERVER_TTS}
      - --update-secrets
      - HERMES_AUTH_JSON_B64=hermes-auth-json-b64:latest,OPENAI_API_KEY=openai-api-key:latest,ELEVENLABS_API_KEY=elevenlabs-api-key:latest

substitutions:
  _SERVICE: gpt-stt
  _REGION: asia-northeast3
  _CODEX_MODEL: gpt-5.5
  _ELEVENLABS_MODEL_ID: eleven_v3
  _ELEVENLABS_VOICE_ID: EXAVITQu4vr4xnSDxMaL
  _ELEVENLABS_OUTPUT_FORMAT: mp3_44100_128
  _ENABLE_SERVER_TTS: 'true'
  _MEMORY: 1Gi
  _CPU: '1'
  _TIMEOUT: 120s
  _MAX_INSTANCES: '1'
  _CONCURRENCY: '1'

images:
  - gcr.io/$PROJECT_ID/${_SERVICE}
